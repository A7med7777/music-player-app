name: music_player_app
description: "A comprehensive music player with library, now playing, search, favorites, playlists, and profile screens."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State management
  provider: ^6.1.2

  # Audio
  just_audio: ^0.9.40
  audio_service: ^0.18.15
  audio_session: ^0.1.21

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

  # Networking & caching
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  http: ^1.2.2

  # DI & utilities
  get_it: ^8.0.2
  equatable: ^2.0.5
  dartz: ^0.10.1
  uuid: ^4.4.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.3

  # Navigation
  go_router: ^14.3.0

  # Secure storage (for Spotify OAuth tokens)
  flutter_secure_storage: ^9.2.2

  # Icons
  cupertino_icons: ^1.0.8

  # Crypto (for Spotify PKCE)
  crypto: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/
    - assets/translations/

  generate: true
